<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Spring Boot Thymeleaf Hello World Example - Master Branch</title>

    <link rel="stylesheet" th:href="@{webjars/bootstrap/4.2.1/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>

</head>

<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">Spring Boot on App Service</a>
</nav>

<main role="main" class="container">

    <div class="starter-template">
        <h1>Spring Boot</h1>
        <h3>
            ... deployed onto Azure with GitHub Actions
        </h3>
    </div>

    <br>
    <div style="text-align: center;">
        <img class="img-fluid" src="https://swimburger.net/media/ppnn3pcl/azure.png" style="width: 10%"/>
        <img class="img-fluid"src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Heart_coraz%C3%B3n.svg/169px-Heart_coraz%C3%B3n.svg.png" style="width: 10%">
        <img class="img-fluid"src="https://raw.githubusercontent.com/JasonFreeberg/my-spring-app/master/src/main/resources/static/GitHub-Mark-120px-plus.png" style="width: 10%">
    </div>

    <section class="mt-5">
        <div class="row">
            <div class="col-md-6 mb-4">
                <h4>Add a task</h4>
                <form th:action="@{/tasks}" method="post">
                    <div class="form-group">
                        <label for="task">Task</label>
                        <input class="form-control" id="task" name="task" placeholder="Type a new task" type="text">
                    </div>
                    <button class="btn btn-primary" type="submit">Add task</button>
                </form>
            </div>
            <div class="col-md-6 mb-4">
                <h4>Filter tasks</h4>
                <form th:action="@{/}" method="get">
                    <div class="form-group">
                        <label for="keyword">Keyword</label>
                        <input class="form-control" id="keyword" name="keyword" placeholder="Search tasks" th:value="${keyword}" type="text">
                    </div>
                    <button class="btn btn-outline-secondary" type="submit">Filter</button>
                </form>
            </div>
        </div>

        <h4>Tasks</h4>
        <ul class="list-group">
            <li class="list-group-item" th:each="task : ${tasks}" th:text="${task}"></li>
            <li class="list-group-item text-muted" th:if="${#lists.isEmpty(tasks)}">No tasks found.</li>
        </ul>
    </section>

</main>
<!-- /.container -->

<script type="text/javascript" th:src="@{webjars/bootstrap/4.2.1/js/bootstrap.min.js}"></script>
</body>
</html>
